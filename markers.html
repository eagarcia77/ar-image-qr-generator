<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Universidad Interamericana de Puerto Rico Recinto de San Germán – Markers AR</title>
  <link rel="stylesheet" href="css/app.css"/>
<style>
.eagr-watermark{
  position:fixed;
  right:8px;
  bottom:6px;
  z-index:9999;
  font-family:Arial,Helvetica,sans-serif;
  font-size:10px;
  font-weight:700;
  color:rgba(20,33,29,.18);
  pointer-events:none;
  user-select:none;
  letter-spacing:.04em;
}
</style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Descarga individual de Markers</h1>
      <p>Puede descargar cada Marker por separado en formato <strong>PNG</strong> o su archivo <strong>PATT</strong>.</p>
      <div class="marker-card-grid">
        <div class="marker-card">
          <h2>INTER SG</h2>
          <img src="assets/inter-sg-marker.png" alt="Marker INTER SG"/>
          <div class="actions">
            <a href="assets/inter-sg-marker.png" download="inter-sg-marker.png" class="button-link">Descargar PNG</a>
            <a href="assets/inter-sg-marker.patt" download="inter-sg-marker.patt" class="button-link gold">Descargar PATT</a>
          </div>
        </div>
        <div class="marker-card">
          <h2>INTER</h2>
          <p>Este marcador dice solo <strong>INTER</strong>.</p>
          <img src="assets/inter-marker-generic.png" alt="Marker INTER"/>
          <div class="actions">
            <a href="assets/inter-marker-generic.png" download="inter-marker-generic.png" class="button-link">Descargar PNG</a>
            <a href="assets/inter-marker-generic.patt" download="inter-marker-generic.patt" class="button-link gold">Descargar PATT</a>
          </div>
        </div>
        <div class="marker-card">
          <h2>HIRO</h2>
          <img src="assets/hiro-marker-generic.png" alt="Marker HIRO"/>
          <div class="actions">
            <a href="assets/hiro-marker-generic.png" download="hiro-marker-generic.png" class="button-link">Descargar PNG</a>
            <a href="assets/hiro-marker-generic.patt" download="hiro-marker-generic.patt" class="button-link gold">Descargar PATT</a>
          </div>
        </div>
      </div>
      <div class="actions" style="margin-top:18px;">
        <a href="index.html" class="button-link">Volver al generador</a>
      </div>
    </section>
  </main>
  <div class="eagr-watermark">E.A.G.R.</div>
</body>
</html>
