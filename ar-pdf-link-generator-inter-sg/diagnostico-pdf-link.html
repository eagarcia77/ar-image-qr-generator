<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Diagnóstico PDF/Link Blackboard</title><link rel="stylesheet" href="css/app.css"/></head><body><main class="container"><section class="card"><h1>Diagnóstico PDF/Link Blackboard</h1><p>Use esta página para verificar si un enlace de PDF o página abre en el navegador.</p><label for="url">URL del documento o enlace</label><input id="url" type="url" placeholder="https://interbb.blackboard.com/bbcswebdav/courses/.../documento.pdf"/><div class="actions"><button id="test">Probar vista embebida</button><a id="open" href="#" target="_blank" rel="noopener" class="button-link">Abrir en pestaña nueva</a></div><div id="result" class="status"></div><iframe id="frame" class="preview-frame hidden" title="Vista previa"></iframe></section></main><script>const url=document.getElementById('url'); const test=document.getElementById('test'); const open=document.getElementById('open'); const result=document.getElementById('result'); const frame=document.getElementById('frame'); test.addEventListener('click',()=>{const value=url.value.trim(); if(!value){result.textContent='Escriba un URL.'; result.className='status error'; return;} open.href=value; frame.src=value; frame.classList.remove('hidden'); result.textContent='Vista previa cargada. Si no se ve, use Abrir en pestaña nueva y revise permisos de Blackboard.'; result.className='status warn';});</script></body></html>
