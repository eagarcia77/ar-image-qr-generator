<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Universidad Interamericana de Puerto Rico Recinto de San Germán – Prueba de Markers</title>
  <link rel="stylesheet" href="css/app.css"/>
<style>
.eagr-watermark{
  position:fixed;
  right:8px;
  bottom:6px;
  z-index:9999;
  font-family:Arial,Helvetica,sans-serif;
  font-size:10px;
  font-weight:700;
  color:rgba(20,33,29,.18);
  pointer-events:none;
  user-select:none;
  letter-spacing:.04em;
}
</style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Prueba de Markers</h1>
      <p>Seleccione el Marker que desea probar.</p>
      <div class="actions">
        <a href="markers.html" class="button-link">Ver todos los Markers</a>
      </div>
      <ul>
        <li><strong>Marker INTER SG</strong>: para San Germán.</li>
        <li><strong>Marker INTER</strong>: genérico para otras Inter. Este marcador dice solo <strong>INTER</strong>.</li>
        <li><strong>Marker HIRO</strong>: genérico.</li>
      </ul>
    </section>
  </main>
  <div class="eagr-watermark">E.A.G.R.</div>
