<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Prueba del marcador INTER SG</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body{margin:0;overflow:hidden;font-family:Arial,Helvetica,sans-serif}.msg{position:fixed;top:12px;left:12px;right:12px;z-index:10;background:rgba(0,0,0,.75);color:#fff;padding:14px;border-radius:14px}.ok{display:none;position:fixed;bottom:12px;left:12px;right:12px;z-index:11;background:#FED141;color:#14211d;padding:14px;border-radius:14px;font-weight:800;text-align:center}
  </style>
</head>
<body>
  <div class="msg"><strong>Prueba del marcador INTER SG</strong><br>Permite la cámara y apunta al marcador nuevo. Si funciona, aparecerá un cubo verde y un mensaje de detección.</div>
  <div id="ok" class="ok">Marcador INTER SG detectado correctamente</div>
  <a-scene embedded vr-mode-ui="enabled:false" renderer="logarithmicDepthBuffer:true" arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; patternRatio: 0.5;">
    <a-marker id="m" type="pattern" url="assets/inter-sg-marker.patt">
      <a-box position="0 0.5 0" rotation="0 45 0" color="#007B5F"></a-box>
      <a-text value="INTER SG" position="0 1.25 0" align="center" color="#FED141" width="4"></a-text>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>
  <script>
    const m=document.getElementById('m'); const ok=document.getElementById('ok');
    m.addEventListener('markerFound',()=>ok.style.display='block');
    m.addEventListener('markerLost',()=>ok.style.display='none');
  </script>
</body>
</html>
