<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Realidad Aumentada Inter SG</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin:0; overflow:hidden; font-family: Arial, Helvetica, sans-serif; }
    .overlay {
      position: fixed; top: 12px; left: 12px; right: 12px; z-index: 10;
      background: rgba(0,0,0,.74); color:#fff; padding: 14px 16px; border-radius: 14px;
    }
    .overlay h1 { margin:0 0 6px; font-size:1rem; }
    .overlay p { margin:0; font-size:.9rem; line-height:1.35; }
    .bottom-box {
      position: fixed; left: 12px; right: 12px; bottom: 12px; z-index: 11;
      padding: 12px 14px; border-radius: 14px; color:#fff;
    }
    .error { background: rgba(166, 24, 34, .94); display:none; }
    .hint { background: rgba(0, 123, 95, .94); display:none; }
    .hint a, .hint button {
      border:0; border-radius:999px; padding:9px 12px; margin-top:8px; font-weight:800;
      background:#FED141; color:#14211d; text-decoration:none; display:inline-block;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1 id="titleText">Realidad Aumentada Inter SG</h1>
    <p>Permite acceso a la cámara. Luego apunta al marcador <strong>Inter SG</strong> para ver el contenido en Realidad Aumentada.</p>
  </div>

  <div id="errorBox" class="bottom-box error"></div>
  <div id="actionBox" class="bottom-box hint">
    <span id="actionText"></span><br>
    <button id="playVideoBtn" type="button" style="display:none;">Activar video</button>
    <a id="youtubeBtn" href="#" target="_blank" rel="noopener" style="display:none;">Abrir video en YouTube</a>
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    renderer="logarithmicDepthBuffer: true; colorManagement: true;"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
  >
    <a-assets>
      <img id="arImage" crossorigin="anonymous" />
      <video id="arVideo" crossorigin="anonymous" muted loop playsinline webkit-playsinline preload="auto"></video>
    </a-assets>

    <a-marker id="interMarker" type="pattern" url="assets/inter-sg-marker.patt">
      <a-plane id="mediaPlane" position="0 0.5 0" rotation="-90 0 0" width="1.4" height="1"></a-plane>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script src="js/marker-ar.js"></script>
</body>
</html>
