<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Realidad Aumentada INTER SG</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body{margin:0;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:#000}
    .overlay{
      position:fixed;top:12px;left:12px;right:12px;z-index:20;
      background:rgba(0,0,0,.72);color:#fff;padding:14px 16px;border-radius:14px
    }
    .overlay h1{margin:0 0 6px;font-size:1rem}
    .overlay p{margin:0;font-size:.9rem;line-height:1.35}
    .bottom-box{
      position:fixed;left:12px;right:12px;bottom:12px;z-index:25;
      padding:12px 14px;border-radius:14px;color:#fff
    }
    .error{background:rgba(166,24,34,.94);display:none}
    .hint{background:rgba(0,123,95,.94)}
    .hint button,.hint a{
      border:0;border-radius:999px;padding:9px 12px;margin-top:8px;margin-right:6px;
      font-weight:800;background:#FED141;color:#14211d;text-decoration:none;display:inline-block
    }
    .media-layer{
      position:fixed;left:50%;top:50%;z-index:18;
      transform:translate(-50%,-50%) scale(1);
      transform-origin:center center;
      display:none;align-items:center;justify-content:center;
      max-width:92vw;max-height:72vh;pointer-events:auto;
    }
    .media-layer img,.media-layer video,.media-layer iframe{
      max-width:92vw;max-height:72vh;border-radius:16px;
      background:transparent;box-shadow:0 12px 34px rgba(0,0,0,.25)
    }
    .media-layer iframe{width:min(92vw,900px);height:min(52vw,506px);border:0;background:#000}
    .controls{
      position:fixed;right:12px;top:122px;z-index:26;display:flex;flex-direction:column;gap:8px
    }
    .controls button{
      width:52px;height:52px;border:0;border-radius:14px;font-size:24px;font-weight:900;
      background:rgba(255,255,255,.94);color:#14211d;box-shadow:0 8px 20px rgba(0,0,0,.18)
    }
    .controls small{background:rgba(255,255,255,.94);padding:8px 10px;border-radius:10px;color:#14211d;font-weight:700;text-align:center}
  </style>
</head>
<body>
  <div class="overlay">
    <h1 id="titleText">Realidad Aumentada INTER SG</h1>
    <p>Permite acceso a la cámara. Apunta al marcador <strong>INTER SG</strong>. Si el marcador no se detecta, usa el botón de respaldo.</p>
  </div>

  <div id="mediaLayer" class="media-layer"></div>

  <div class="controls">
    <button id="zoomInBtn" type="button">+</button>
    <button id="zoomOutBtn" type="button">−</button>
    <button id="resetBtn" type="button">↺</button>
    <small>Zoom</small>
  </div>

  <div id="errorBox" class="bottom-box error"></div>
  <div id="actionBox" class="bottom-box hint">
    <span id="actionText">Buscando marcador INTER SG...</span><br>
    <button id="manualShowBtn" type="button">Mostrar contenido sin marcador</button>
    <button id="playVideoBtn" type="button" style="display:none;">Activar video</button>
    <a id="youtubeBtn" href="#" target="_blank" rel="noopener" style="display:none;">Abrir video en YouTube</a>
  </div>

  <a-scene
    vr-mode-ui="enabled:false"
    embedded
    renderer="logarithmicDepthBuffer:true;colorManagement:true;alpha:true;"
    arjs="trackingMethod:best;sourceType:webcam;debugUIEnabled:false;patternRatio:0.5;"
  >
    <a-marker id="interMarker" type="pattern" url="assets/inter-sg-marker.patt"></a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script src="js/marker-ar.js"></script>
</body>
</html>
