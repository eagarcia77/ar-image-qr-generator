<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AR con marcador HIRO</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin:0; overflow:hidden; font-family: Arial, Helvetica, sans-serif; }
    .overlay {
      position: fixed; top: 12px; left: 12px; right: 12px; z-index: 10;
      background: rgba(0,0,0,.70); color:#fff; padding: 14px 16px; border-radius: 14px;
    }
    .overlay h1 { margin: 0 0 6px; font-size: 1rem; }
    .overlay p { margin: 0; font-size: .9rem; line-height: 1.35; }
    .error {
      position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 11;
      background: rgba(166, 24, 34, .92); color:#fff; padding: 12px 14px; border-radius: 14px; display:none;
    }
    .hint {
      position: fixed; bottom: 12px; left: 12px; right: 12px; z-index: 10;
      background: rgba(255,255,255,.92); color:#1b2f29; padding: 12px 14px; border-radius: 14px;
      font-size: .9rem;
    }
    a { color: #FED141; }
  </style>
</head>
<body>
  <div class="overlay">
    <h1 id="titleText">Realidad Aumentada</h1>
    <p>La cámara se activa automáticamente. Apunta al marcador <strong>HIRO</strong> para ver la imagen en AR.</p>
  </div>
  <div id="errorBox" class="error"></div>
  <div class="hint">Si no tienes el marcador, abre <a href="marker-hiro.html" target="_blank" rel="noopener">marker-hiro.html</a> en otra pantalla o imprímelo.</div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    renderer="logarithmicDepthBuffer: true; colorManagement: true;"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
  >
    <a-assets>
      <img id="arImage" alt="Imagen AR" crossorigin="anonymous" />
    </a-assets>

    <a-marker preset="hiro">
      <a-plane id="imagePlane" src="#arImage" position="0 0.5 0" rotation="-90 0 0" width="1.4" height="1"></a-plane>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const params = new URLSearchParams(window.location.search);
    const imgUrl = params.get('data') || params.get('img');
    const title = params.get('title') || 'Realidad Aumentada';
    const titleText = document.getElementById('titleText');
    const errorBox = document.getElementById('errorBox');
    const arImage = document.getElementById('arImage');
    const imagePlane = document.getElementById('imagePlane');

    titleText.textContent = title;

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    if (!imgUrl) {
      showError('No hay contenido AR. Regenera el QR desde el generador.');
    } else {
      const tester = new Image();
      tester.onload = () => {
        arImage.setAttribute('src', imgUrl);
        const ratio = tester.width / tester.height || 1;
        let width = 1.4;
        let height = width / ratio;
        if (height > 1.6) {
          height = 1.6;
          width = height * ratio;
        }
        imagePlane.setAttribute('width', width.toFixed(3));
        imagePlane.setAttribute('height', height.toFixed(3));
      };
      tester.onerror = () => {
        showError('La imagen no se pudo cargar. Verifica que el enlace sea directo y que no requiera acceso restringido.');
      };
      tester.src = imgUrl;
    }
  </script>
</body>
</html>
