<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcador Inter SG</title>
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .marker-wrap { text-align:center; }
    .marker-wrap img {
      width:min(92vw, 520px);
      border:12px solid #fff;
      box-shadow:0 12px 34px rgba(0,0,0,.10);
      border-radius: 8px;
      background:#fff;
    }
    .print-note { font-size: 1rem; max-width: 760px; margin: 0 auto 20px; }
    @media print {
      .no-print { display:none !important; }
      .marker-wrap img { width: 80vw; box-shadow:none; border:0; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card marker-wrap">
      <h1>Marcador Inter SG</h1>
      <p class="print-note">Este marcador se debe descargar o imprimir. El estudiante debe apuntar la cámara hacia esta imagen para que aparezca el contenido en Realidad Aumentada.</p>
      <img src="assets/inter-sg-marker.png" alt="Marcador Inter SG para Realidad Aumentada" />
      <div class="actions no-print" style="justify-content:center; margin-top:20px;">
        <a href="assets/inter-sg-marker.png" download="Marcador_Inter_SG.png" class="button-link gold">Descargar marcador Inter SG</a>
        <button onclick="window.print()">Imprimir marcador</button>
      </div>
    </section>
  </main>
</body>
</html>
