<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Universidad Interamericana de Puerto Rico Recinto de San Germán – AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body{margin:0;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:#000}
    .overlay{position:fixed;top:12px;left:12px;right:12px;z-index:20;background:rgba(0,0,0,.72);color:#fff;padding:14px 16px;border-radius:14px}
    .overlay h1{margin:0 0 6px;font-size:1rem}.overlay p{margin:0;font-size:.9rem;line-height:1.35}.overlay .tagline{display:inline-block;margin-top:8px;padding:6px 10px;border-radius:999px;background:rgba(254,209,65,.18);color:#FED141;font-size:.8rem;font-weight:800;letter-spacing:.03em}
    .media-layer{position:fixed;left:50%;top:54%;z-index:18;transform:translate(-50%,-50%) scale(1);transform-origin:center center;width:min(92vw,900px);max-height:74vh;background:rgba(255,255,255,.96);border-radius:18px;overflow:hidden;box-shadow:0 18px 46px rgba(0,0,0,.32);display:none;border:3px solid #007B5F;backdrop-filter:blur(4px);animation:floaty 3.8s ease-in-out infinite}.media-layer.no-float{animation:none}.media-layer.transparent-mode{background:transparent;border:none;box-shadow:none;backdrop-filter:none;overflow:visible}.media-layer.transparent-mode .media-header{display:none}.media-layer.transparent-mode .media-body{background:transparent;padding:0}.media-layer.transparent-mode .media-actions{justify-content:center;padding-top:10px}.media-layer.transparent-mode .media-actions a,.media-layer.transparent-mode .media-actions button{box-shadow:0 8px 20px rgba(0,0,0,.18)}@keyframes floaty{0%{transform:translate(-50%,-50%) scale(1) translateY(0px)}50%{transform:translate(-50%,-50%) scale(1) translateY(-6px)}100%{transform:translate(-50%,-50%) scale(1) translateY(0px)}}
    .media-header{padding:12px 14px;background:#007B5F;color:#fff}.media-header h2{margin:0;font-size:1rem}.media-header p{margin:4px 0 0;font-size:.85rem}
    .media-body{padding:12px;background:#fff;text-align:center}.media-body img,.media-body video{max-width:100%;max-height:55vh;border-radius:12px;background:transparent}.media-body img{filter:drop-shadow(0 18px 34px rgba(0,0,0,.28))}.media-body iframe{width:100%;height:52vh;border:1px solid #d7e5e0;border-radius:12px;background:#fff}
    .media-layer.image-3d-mode{perspective:1400px}.media-layer.image-3d-mode .media-actions{justify-content:center}
    .ar-stage-3d{position:relative;display:flex;align-items:center;justify-content:center;padding:28px 18px 18px;min-height:52vh;perspective:1500px;overflow:visible}
    .ar-depth-shadow{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:min(72vw,520px);height:42px;background:radial-gradient(ellipse at center, rgba(0,0,0,.32) 0%, rgba(0,0,0,.16) 42%, rgba(0,0,0,0) 75%);filter:blur(12px);animation:shadowPulse 4s ease-in-out infinite}
    .ar-glow-ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(74vw,560px);height:min(74vw,560px);border-radius:32px;background:radial-gradient(circle at center, rgba(0,123,95,.22), rgba(254,209,65,.10) 42%, rgba(0,123,95,0) 72%);filter:blur(10px);animation:glowPulse 4.2s ease-in-out infinite}
    .ar-frame-3d{position:relative;transform-style:preserve-3d;animation:holoFloat 4.8s ease-in-out infinite;transform:rotateX(12deg) rotateY(-10deg) translateZ(0)}
    .ar-frame-inner{position:relative;padding:16px;border-radius:26px;background:linear-gradient(145deg, rgba(255,255,255,.92), rgba(228,244,239,.92));border:1px solid rgba(255,255,255,.75);box-shadow:0 24px 52px rgba(0,0,0,.24), 0 0 0 1px rgba(0,123,95,.14), inset 0 1px 0 rgba(255,255,255,.75);backdrop-filter:blur(8px)}
    .ar-frame-inner::before{content:"";position:absolute;inset:-10px;border-radius:32px;background:linear-gradient(135deg, rgba(0,123,95,.18), rgba(254,209,65,.16), rgba(255,255,255,0));transform:translateZ(-1px);z-index:-1;filter:blur(2px)}
    .ar-frame-inner::after{content:"";position:absolute;left:12px;right:12px;top:10px;height:18%;border-radius:18px;background:linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,0));pointer-events:none}
    .ar-image-3d{display:block;max-width:min(76vw,680px);max-height:52vh;object-fit:contain;border-radius:18px;filter:drop-shadow(0 18px 34px rgba(0,0,0,.32));transform:translateZ(32px)}
    .ar-tech-badge{position:absolute;right:14px;top:14px;padding:8px 12px;border-radius:999px;background:rgba(0,123,95,.92);color:#fff;font-size:.8rem;font-weight:800;letter-spacing:.04em;box-shadow:0 8px 16px rgba(0,123,95,.18)}
    .ar-frame-3d:hover{transform:rotateX(8deg) rotateY(-6deg) translateY(-2px)}
    @keyframes holoFloat{0%{transform:rotateX(12deg) rotateY(-10deg) translateY(0)}50%{transform:rotateX(8deg) rotateY(8deg) translateY(-8px)}100%{transform:rotateX(12deg) rotateY(-10deg) translateY(0)}}
    @keyframes glowPulse{0%{opacity:.72;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.04)}100%{opacity:.72;transform:translate(-50%,-50%) scale(1)}}
    @keyframes shadowPulse{0%{opacity:.5;transform:translateX(-50%) scale(1)}50%{opacity:.34;transform:translateX(-50%) scale(.94)}100%{opacity:.5;transform:translateX(-50%) scale(1)}}
    
    .video-stage-future{position:relative;display:flex;align-items:center;justify-content:center;padding:22px;min-height:52vh;overflow:visible}
    .video-glow-ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(78vw,700px);height:min(62vh,460px);border-radius:28px;background:radial-gradient(circle at center, rgba(0,123,95,.20), rgba(254,209,65,.12) 40%, rgba(0,123,95,0) 72%);filter:blur(14px);animation:glowPulse 4.2s ease-in-out infinite}
    .video-card-future{position:relative;width:min(82vw,760px);padding:14px;border-radius:26px;background:linear-gradient(145deg, rgba(255,255,255,.94), rgba(236,247,243,.94));box-shadow:0 24px 52px rgba(0,0,0,.24), 0 0 0 1px rgba(0,123,95,.14), inset 0 1px 0 rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.8);backdrop-filter:blur(8px)}
    .video-card-future::before{content:"";position:absolute;inset:-10px;border-radius:32px;background:linear-gradient(135deg, rgba(0,123,95,.18), rgba(254,209,65,.16), rgba(255,255,255,0));z-index:-1;filter:blur(2px)}
    .video-badge-row{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
    .video-badge,.audio-badge{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;font-size:.8rem;font-weight:800;letter-spacing:.03em}
    .video-badge{background:#007B5F;color:#fff;box-shadow:0 8px 16px rgba(0,123,95,.18)}
    .audio-badge{background:#FFF4CC;color:#5a4a10}
    .video-player-future{display:block;width:100%;max-height:54vh;border-radius:18px;background:#000;box-shadow:0 14px 28px rgba(0,0,0,.28)}
    .video-help{margin:10px 4px 0;color:#4d635c;font-size:.92rem;line-height:1.4}

    .media-actions{display:flex;gap:8px;flex-wrap:wrap;padding:0 12px 12px}.media-actions a,.media-actions button{border:0;border-radius:999px;padding:10px 12px;font-weight:800;text-decoration:none;background:#FED141;color:#14211d}
    .bottom-box{position:fixed;left:12px;right:12px;bottom:12px;z-index:25;padding:12px 14px;border-radius:14px;color:#fff}.error{background:rgba(166,24,34,.94);display:none}.hint{background:rgba(0,123,95,.94)}
    .hint button,.hint a{border:0;border-radius:999px;padding:9px 12px;margin-top:8px;margin-right:6px;font-weight:800;background:#FED141;color:#14211d;text-decoration:none}
    .controls{position:fixed;right:12px;top:122px;z-index:26;display:flex;flex-direction:column;gap:8px}.controls button{width:52px;height:52px;border:0;border-radius:14px;font-size:24px;font-weight:900;background:rgba(255,255,255,.94);color:#14211d;box-shadow:0 8px 20px rgba(0,0,0,.18)}.controls small{background:rgba(255,255,255,.94);padding:8px 10px;border-radius:10px;color:#14211d;font-weight:700;text-align:center}
    .youtube-card{display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center}.youtube-card img{width:min(100%,720px);max-height:42vh;object-fit:cover;border-radius:16px;box-shadow:0 10px 28px rgba(0,0,0,.18)}.youtube-card .yt-button{display:inline-flex;align-items:center;justify-content:center;padding:14px 18px;border-radius:999px;background:#cc0000;color:#fff;text-decoration:none;font-weight:900;font-size:1rem}.youtube-card p{margin:0;color:#5d716b;font-size:.95rem;line-height:1.4}
    
    .youtube-float-stage{position:relative;display:flex;align-items:center;justify-content:center;padding:22px;min-height:52vh;overflow:visible}
    .youtube-holo-glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(82vw,760px);height:min(58vh,470px);border-radius:36px;background:radial-gradient(circle at center, rgba(204,0,0,.22), rgba(0,123,95,.16) 38%, rgba(254,209,65,.10) 58%, rgba(0,0,0,0) 78%);filter:blur(16px);animation:glowPulse 4.2s ease-in-out infinite}
    .youtube-player-card{position:relative;width:min(84vw,780px);padding:14px;border-radius:28px;background:linear-gradient(145deg, rgba(255,255,255,.95), rgba(244,249,247,.95));box-shadow:0 26px 58px rgba(0,0,0,.28), 0 0 0 1px rgba(0,123,95,.14), inset 0 1px 0 rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.85);backdrop-filter:blur(8px);transform-style:preserve-3d;animation:holoFloat 4.8s ease-in-out infinite}
    .youtube-player-card::before{content:"";position:absolute;inset:-10px;border-radius:34px;background:linear-gradient(135deg, rgba(204,0,0,.16), rgba(0,123,95,.18), rgba(254,209,65,.14), rgba(255,255,255,0));z-index:-1;filter:blur(2px)}
    .youtube-topbar{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
    .youtube-live-badge,.youtube-audio-badge{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;font-size:.8rem;font-weight:900;letter-spacing:.03em}
    .youtube-live-badge{background:#cc0000;color:#fff;box-shadow:0 8px 16px rgba(204,0,0,.22)}
    .youtube-audio-badge{background:#FFF4CC;color:#5a4a10;border:1px solid rgba(254,209,65,.65)}
    .youtube-frame-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:20px;overflow:hidden;background:#000;box-shadow:0 16px 32px rgba(0,0,0,.32)}
    .youtube-frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;border-radius:20px;background:#000}
    .youtube-start-panel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:linear-gradient(135deg, rgba(0,0,0,.72), rgba(0,123,95,.35));color:#fff;text-align:center;padding:22px;z-index:2}
    .youtube-start-panel.hidden-panel{display:none}
    .youtube-play-big{border:0;border-radius:999px;width:92px;height:92px;background:#cc0000;color:#fff;font-size:42px;font-weight:900;box-shadow:0 16px 32px rgba(204,0,0,.32);cursor:pointer}
    .youtube-start-panel strong{font-size:1.05rem}.youtube-start-panel span{font-size:.9rem;line-height:1.35;max-width:520px}
    .youtube-help{margin:10px 4px 0;color:#4d635c;font-size:.92rem;line-height:1.4}

    .link-card{display:flex;flex-direction:column;gap:12px;align-items:center;justify-content:center;padding:18px}.link-icon{width:82px;height:82px;border-radius:22px;background:#007B5F;color:#fff;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900}.link-card .link-button{display:inline-flex;align-items:center;justify-content:center;padding:14px 18px;border-radius:999px;background:#007B5F;color:#fff;text-decoration:none;font-weight:900;font-size:1rem}.link-card p{margin:0;color:#5d716b;font-size:.95rem;line-height:1.4;word-break:break-word}
  
.eagr-watermark{
  position:fixed;
  right:8px;
  bottom:6px;
  z-index:9999;
  font-family:Arial,Helvetica,sans-serif;
  font-size:10px;
  font-weight:700;
  color:rgba(20,33,29,.18);
  pointer-events:none;
  user-select:none;
  letter-spacing:.04em;
}

  
    .overlay.auto-hidden{opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .45s ease, transform .45s ease}
    .hint.text-hidden #actionText{display:none}
    .hint.text-hidden br{display:none}
    .hint.text-hidden{background:rgba(0,123,95,.28);backdrop-filter:blur(6px);padding:8px 10px}
    .controls{transition:opacity .2s ease}

  
    .controls.auto-hidden{opacity:0;pointer-events:none;transition:opacity .45s ease}
    .hint.text-hidden{opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .45s ease, transform .45s ease}
    .media-layer.clean-view .media-header{display:none}
    .media-layer.clean-view .media-actions{display:none}
    .media-layer.clean-view .video-help,.media-layer.clean-view .youtube-help{display:none}
    .media-layer.clean-view{max-height:88vh}
    .media-layer.clean-view .media-body{padding:0;background:transparent}
    .media-layer.clean-view:not(.transparent-mode){border-color:rgba(0,123,95,.35);background:transparent;box-shadow:none;backdrop-filter:none}

  
    .audio-instruction{margin:10px 4px 0;color:#14211d;background:#FFF4CC;border:1px solid rgba(254,209,65,.7);padding:10px 12px;border-radius:14px;font-size:.92rem;line-height:1.35}
    .audio-instruction strong{color:#007B5F}
                </style>
</head>
<body>
  <div class="overlay">
    <h1 id="pageTitle">AR</h1>
    <p><span id="overlayMarkerLabel">Apunta al Marker seleccionado.</span> El contenido aparece como tarjeta flotante y puedes hacer zoom con dos dedos.</p>
    <span class="tagline">Immersive AR • 3D View • Video with Audio</span>
  </div>

  <div id="mediaLayer" class="media-layer">
    <div class="media-header">
      <h2 id="contentTitle">Contenido AR</h2>
      <p id="contentDescription"></p>
    </div>
    <div id="mediaBody" class="media-body"></div>
    <div class="media-actions">
      <a id="openContentBtn" href="#" target="_blank" rel="noopener">Abrir contenido</a>
      <button id="hideBtn" type="button">Ocultar</button>
    </div>
  </div>

  <div class="controls">
    <button id="zoomInBtn" type="button">+</button>
    <button id="zoomOutBtn" type="button">−</button>
    <button id="resetBtn" type="button">↺</button>
    <small>Zoom táctil</small>
  </div>

  <div id="errorBox" class="bottom-box error"></div>
  <div id="actionBox" class="bottom-box hint">
    <span id="actionText">Buscando Marker...</span><br>
    <button id="manualShowBtn" type="button">Mostrar contenido sin marcador</button>
    <button id="playVideoBtn" type="button" style="display:none;">▶ Reproducir video</button>
    <button id="audioBtn" type="button" style="display:none;">🔊 Activar audio</button>
    <button id="videoAudioBtn" type="button" style="display:none;">🔊 Activar sonido</button>
    <a id="youtubeBtn" href="#" target="_blank" rel="noopener" style="display:none;">Abrir video en YouTube</a>
    <button id="youtubeAudioBtn" type="button" style="display:none;">▶ Reproducir YouTube</button>
  </div>

  <a-scene vr-mode-ui="enabled:false" embedded renderer="logarithmicDepthBuffer:true;colorManagement:true;alpha:true;" arjs="trackingMethod:best;sourceType:webcam;debugUIEnabled:false;patternRatio:0.5;detectionMode:mono_and_matrix;matrixCodeType:3x3;maxDetectionRate:60;">
    <a-marker id="interSgMarker" type="pattern" url="assets/inter-sg-marker.patt"></a-marker>
    <a-marker id="interMarker" type="pattern" url="assets/inter-marker-generic.patt"></a-marker>
    <a-marker id="hiroMarker" type="pattern" url="assets/hiro-marker-generic.patt"></a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script src="js/viewer-ar.js"></script>
  <div class="eagr-watermark">E.A.G.R.</div>
</body>
</html>
